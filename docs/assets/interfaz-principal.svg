<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc">
  <title id="title">Mockup de la interfaz principal de Mecanografía</title>
  <desc id="desc">Vista previa de la pantalla principal con texto a copiar, área de escritura, métricas PPM, WPM, precisión, errores, selector de nivel, selector de modo y estado visual de error.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #e5e7eb; filter: url(#shadow); }
      .panel { fill: #0f172a; }
      .soft { fill: #f1f5f9; }
      .select { fill: #eef2ff; }
      .error-soft { fill: #fee2e2; stroke: #f87171; }
      .input-error { fill: #ffffff; stroke: #f87171; stroke-width: 4; }
      .title { font: 700 56px Inter, Arial, sans-serif; fill: #111827; }
      .h2 { font: 700 34px Inter, Arial, sans-serif; fill: #111827; }
      .body { font: 400 22px Inter, Arial, sans-serif; fill: #64748b; }
      .eyebrow { font: 800 18px Inter, Arial, sans-serif; letter-spacing: 1px; fill: #2563eb; }
      .label { font: 700 16px Inter, Arial, sans-serif; fill: #64748b; }
      .metric-label { font: 800 15px Inter, Arial, sans-serif; fill: #64748b; }
      .metric { font: 800 30px Inter, Arial, sans-serif; }
      .mono { font: 400 29px "DejaVu Sans Mono", Consolas, monospace; }
      .mono-lg { font: 400 31px "DejaVu Sans Mono", Consolas, monospace; }
      .button { fill: #2563eb; }
      .button-text { font: 800 22px Inter, Arial, sans-serif; fill: #ffffff; }
      .green { fill: #16a34a; }
      .blue { fill: #2563eb; }
      .red { fill: #dc2626; }
      .muted { fill: #64748b; }
      .slate { fill: #1e293b; }
      .copy-ok { fill: #86efac; }
      .copy-pending { fill: #cbd5e1; }
      .copy-error-bg { fill: #dc2626; }
      .copy-error { fill: #ffffff; }
      .current { fill: #facc15; }
    </style>
  </defs>

  <rect width="1440" height="1000" class="bg"/>
  <rect x="40" y="30" width="1360" height="910" rx="36" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <text x="80" y="80" class="eyebrow">MECANOGRAFÍA</text>
  <text x="80" y="158" class="title">Entrenador modular</text>
  <text x="80" y="190" class="body">Mockup de la pantalla principal con práctica guiada, métricas y validación en tiempo real.</text>

  <rect x="1110" y="55" width="250" height="115" rx="24" class="card"/>
  <text x="1135" y="100" class="label">Entorno</text>
  <text x="1135" y="148" class="h2" font-size="30">Web + escritorio</text>

  <rect x="70" y="220" width="935" height="680" rx="28" class="card"/>
  <text x="105" y="270" class="eyebrow">PRÁCTICA GUIADA</text>
  <text x="105" y="326" class="h2">Texto técnico con signos</text>
  <text x="105" y="354" class="body">Copia el texto manteniendo precisión; el error actual se resalta en rojo.</text>
  <rect x="820" y="255" width="135" height="60" rx="16" class="button"/>
  <text x="887" y="292" text-anchor="middle" class="button-text">Reiniciar</text>

  <rect x="105" y="365" width="865" height="205" rx="22" class="panel"/>
  <text x="130" y="408" class="label" fill="#94a3b8">Texto a copiar</text>
  <text x="130" y="466" class="mono-lg copy-ok">Durante la práctica, ajusta el </text>
  <rect x="648" y="443" width="92" height="34" rx="7" class="copy-error-bg"/>
  <text x="654" y="466" class="mono-lg copy-error">ritmo</text>
  <text x="754" y="466" class="mono-lg copy-pending"> sin prisa.</text>
  <text x="130" y="532" class="mono-lg copy-pending">Corrige comas, tildes y números: 42%, 3/4 y 18:30.</text>
  <rect x="579" y="493" width="24" height="42" rx="5" class="current"/>
  <text x="584" y="525" class="mono-lg" fill="#111827">4</text>

  <rect x="105" y="590" width="865" height="65" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="130" y="630" font="700 18px Inter, Arial, sans-serif" fill="#1e293b">6 min sugeridos</text>
  <text x="315" y="630" font="400 18px Inter, Arial, sans-serif" fill="#475569">· puntuación avanzada · tildes · cifras</text>
  <text x="735" y="630" font="400 18px Inter, Arial, sans-serif" class="blue">#intermedio  #fluidez</text>

  <rect x="105" y="680" width="865" height="125" rx="20" class="input-error"/>
  <text x="130" y="733" class="mono" fill="#1e293b">Durante la práctica, ajusta el ritno</text>
  <line x1="615" y1="743" x2="691" y2="743" stroke="#dc2626" stroke-width="4"/>
  <text x="130" y="782" font="800 18px Inter, Arial, sans-serif" class="red">Error detectado: se esperaba “m”, se escribió “n”.</text>

  <g aria-label="Métricas de práctica">
    <rect x="105" y="825" width="200" height="56" rx="16" class="soft"/>
    <text x="123" y="851" class="metric-label">PPM</text>
    <text x="202" y="864" class="metric blue">248</text>
    <rect x="321" y="825" width="200" height="56" rx="16" class="soft"/>
    <text x="339" y="851" class="metric-label">WPM</text>
    <text x="428" y="864" class="metric green">49</text>
    <rect x="537" y="825" width="200" height="56" rx="16" class="soft"/>
    <text x="555" y="851" class="metric-label">Precisión</text>
    <text x="629" y="864" class="metric green">96%</text>
    <rect x="753" y="825" width="200" height="56" rx="16" class="soft"/>
    <text x="771" y="851" class="metric-label">Errores</text>
    <text x="868" y="864" class="metric red">3</text>
  </g>

  <rect x="1040" y="220" width="330" height="680" rx="28" class="card"/>
  <text x="1075" y="270" class="eyebrow">CONFIGURACIÓN</text>
  <text x="1075" y="325" class="h2">Sesión actual</text>

  <rect x="1075" y="350" width="260" height="75" rx="18" class="select"/>
  <text x="1095" y="381" class="label">Nivel</text>
  <text x="1095" y="418" font="800 25px Inter, Arial, sans-serif" class="slate">Intermedio ▼</text>
  <rect x="1075" y="455" width="260" height="75" rx="18" class="select"/>
  <text x="1095" y="486" class="label">Modo</text>
  <text x="1095" y="523" font="800 25px Inter, Arial, sans-serif" class="slate">Práctica guiada ▼</text>
  <rect x="1075" y="560" width="260" height="75" rx="18" class="select"/>
  <text x="1095" y="591" class="label">Banco</text>
  <text x="1095" y="628" font="800 24px Inter, Arial, sans-serif" class="slate">Texto con signos ▼</text>

  <rect x="1075" y="690" width="260" height="130" rx="22" class="error-soft"/>
  <text x="1098" y="734" font="800 16px Inter, Arial, sans-serif" class="red">Estado visual</text>
  <text x="1098" y="782" font="800 30px Inter, Arial, sans-serif" class="red">Error activo</text>
  <text x="1098" y="806" font="400 16px Inter, Arial, sans-serif" fill="#7f1d1d">El carácter incorrecto queda marcado</text>
  <text x="1098" y="826" font="400 16px Inter, Arial, sans-serif" fill="#7f1d1d">y la entrada muestra borde rojo.</text>

  <rect x="1075" y="840" width="260" height="40" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="1095" y="864" font="800 15px Inter, Arial, sans-serif" class="green">Leyenda: acierto</text>
  <rect x="1245" y="850" width="26" height="20" rx="6" class="green"/>
  <rect x="1282" y="850" width="26" height="20" rx="6" class="red"/>
  <text x="1315" y="865" font="800 15px Inter, Arial, sans-serif" class="red">error</text>

  <text x="80" y="969" font="400 17px Inter, Arial, sans-serif" class="muted">docs/assets/interfaz-principal.svg · mockup vectorial para documentación y revisión visual sin binarios</text>
</svg>
